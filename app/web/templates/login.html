{% extends "base.html" %}

{% block title %}Connexion — Detective.be{% endblock %}

{% block content %}
<div class="flex items-center justify-center min-h-full">
    <div class="w-full max-w-sm bg-gray-900 border border-gray-800 rounded-lg p-6 shadow-lg">
        <h1 class="text-xl font-semibold mb-4">Connexion</h1>
        <form hx-post="/auth/login" hx-swap="innerHTML" hx-target="#login-result">
            <div class="mb-4">
                <label for="email" class="block text-sm mb-1">Email</label>
                <input type="email" id="email" name="email" required
                       class="w-full px-3 py-2 bg-gray-800 border border-gray-700 rounded focus:outline-none focus:border-blue-500">
            </div>
            <button type="submit"
                    class="w-full px-4 py-2 bg-blue-600 hover:bg-blue-500 rounded font-medium">
                Envoyer le lien magique
            </button>
        </form>
        <div id="login-result" class="mt-4 text-sm">
            {% if message %}{{ message }}{% endif %}
        </div>
    </div>
</div>
{% endblock %}
