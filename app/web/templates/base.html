<!DOCTYPE html>
<html lang="fr" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="csrf-token" content="{{ csrf_token if csrf_token else '' }}">
    <title>{% block title %}Detective.be{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
    <script defer src="https://unpkg.com/alpinejs@3.14.8"></script>
    <style>[x-cloak] { display: none !important; }</style>
</head>
<body class="bg-gray-950 text-gray-100 min-h-screen">
    <div class="flex h-screen">
        <aside class="w-64 bg-gray-900 border-r border-gray-800 hidden md:flex flex-col">
            <div class="p-4 font-bold text-lg border-b border-gray-800">Detective.be</div>
            <nav class="flex-1 p-4 space-y-2">
                {% if user %}
                <a href="/app" class="block px-3 py-2 rounded hover:bg-gray-800">Inbox</a>
                {% if user.role == 'super_admin' %}
                <a href="/admin/dashboard" class="block px-3 py-2 rounded hover:bg-gray-800">Admin</a>
                {% endif %}
                <div class="mt-auto pt-4 border-t border-gray-800">
                    <span class="block text-xs text-gray-500 mb-2">{{ user.email }}</span>
                    <form action="/logout" method="post">
                        <button type="submit" class="text-sm text-red-400 hover:text-red-300">Déconnexion</button>
                    </form>
                </div>
                {% else %}
                <a href="/auth/login" class="block px-3 py-2 rounded hover:bg-gray-800">Connexion</a>
                {% endif %}
            </nav>
        </aside>
        <div class="flex-1 flex flex-col">
            <header class="bg-gray-900 border-b border-gray-800 px-4 py-3 flex items-center justify-between md:hidden">
                <div class="font-bold">Detective.be</div>
            </header>
            <main class="flex-1 p-6 overflow-y-auto">
                {% block content %}{% endblock %}
            </main>
        </div>
    </div>
    <div id="toast-container" class="fixed bottom-4 right-4 space-y-2 z-50"></div>
</body>
</html>
