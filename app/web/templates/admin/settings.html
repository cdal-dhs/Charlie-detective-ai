{% extends "base.html" %}

{% block title %}Paramètres — Admin{% endblock %}

{% block content %}
<div class="mb-6">
    <h1 class="text-2xl font-bold">Configuration</h1>
    <p class="text-gray-400 text-sm">IA, Email et Slack</p>
</div>

<div class="bg-gray-900 border border-gray-800 rounded-lg p-4 max-w-2xl">
    <form hx-post="/admin/api/settings" hx-swap="outerHTML" hx-target="#settings-result">
        <h2 class="font-semibold mb-4">Intelligence Artificielle</h2>
        <div class="space-y-4">
            <div>
                <label class="block text-sm mb-1">Provider</label>
                <select name="llm_provider" class="w-full bg-gray-800 border border-gray-700 rounded px-3 py-2">
                    <option value="ollama_cloud" {{ 'selected' if settings.llm_provider.value == 'ollama_cloud' else '' }}>Ollama Cloud</option>
                    <option value="openrouter" {{ 'selected' if settings.llm_provider.value == 'openrouter' else '' }}>OpenRouter</option>
                </select>
            </div>
            <div>
                <label class="block text-sm mb-1">Base URL</label>
                <input type="url" name="llm_base_url" value="{{ settings.llm_base_url.value }}"
                       class="w-full bg-gray-800 border border-gray-700 rounded px-3 py-2">
            </div>
            <div>
                <label class="block text-sm mb-1">Clé API</label>
                <input type="password" name="llm_api_key_encrypted" placeholder="••••••••abcd"
                       class="w-full bg-gray-800 border border-gray-700 rounded px-3 py-2">
                <p class="text-xs text-gray-500 mt-1">Laisser vide pour conserver la valeur actuelle</p>
            </div>
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm mb-1">Modèle général</label>
                    <input type="text" name="llm_model_general" value="{{ settings.llm_model_general.value }}"
                           class="w-full bg-gray-800 border border-gray-700 rounded px-3 py-2">
                </div>
                <div>
                    <label class="block text-sm mb-1">Modèle analyse</label>
                    <input type="text" name="llm_model_classifier" value="{{ settings.llm_model_classifier.value }}"
                           class="w-full bg-gray-800 border border-gray-700 rounded px-3 py-2">
                </div>
            </div>
        </div>

        <div class="mt-6 flex items-center gap-3">
            <button type="submit" class="px-4 py-2 bg-blue-600 hover:bg-blue-500 rounded font-medium">Sauvegarder</button>
            <div id="settings-result"></div>
        </div>
    </form>

    <hr class="border-gray-800 my-6">

    <h2 class="font-semibold mb-4">Tests de connectivité</h2>
    <div class="flex gap-3">
        <button hx-post="/admin/api/test-imap/1" hx-target="#test-result"
                class="px-3 py-2 bg-gray-800 hover:bg-gray-700 border border-gray-700 rounded text-sm">Tester IMAP Boîte 1</button>
        <button hx-post="/admin/api/test-imap/2" hx-target="#test-result"
                class="px-3 py-2 bg-gray-800 hover:bg-gray-700 border border-gray-700 rounded text-sm">Tester IMAP Boîte 2</button>
        <button hx-post="/admin/api/test-imap/3" hx-target="#test-result"
                class="px-3 py-2 bg-gray-800 hover:bg-gray-700 border border-gray-700 rounded text-sm">Tester IMAP Boîte 3</button>
        <button hx-post="/admin/api/test-slack" hx-target="#test-result"
                class="px-3 py-2 bg-gray-800 hover:bg-gray-700 border border-gray-700 rounded text-sm">Tester Slack</button>
    </div>
    <div id="test-result" class="mt-3"></div>
</div>
{% endblock %}
